replicaCount: 1
image:
  repository: 899631475351.dkr.ecr.us-east-2.amazonaws.com/ai-inference-service
  tag: "6db60c6b7bb1bbdd1ceea3eaaffe9e40e0dcb3ab"
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 8001
  targetPort: 8001
metrics:
  enabled: "true"
  path: "/metrics"
  port: "8001"
env:
  LOG_LEVEL: "info"
  MODEL_NAME: "stub-model"
resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
readinessProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 10
livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 15
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  memory:
    averageUtilization: 70
