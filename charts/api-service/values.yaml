replicaCount: 1

image:
  repository: api-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

metrics:
  enabled: "true"
  path: "/metrics"
  port: "8000"

env:
  AI_SERVICE_URL: "http://ai-inference-service:8001"
  LOG_LEVEL: "info"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

readinessProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 10

livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 15

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  cpu:
    averageUtilization: 70
