replicaCount: 1

image:
  repository: ai-inference-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8001
  targetPort: 8001

env:
  LOG_LEVEL: "info"
  MODEL_NAME: "stub-model"

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

readinessProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 10

livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 15

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  memory:
    averageUtilization: 70
