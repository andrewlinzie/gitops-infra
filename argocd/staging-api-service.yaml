apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: staging-api-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/andrewlinzie/gitops-infra.git
    targetRevision: main
    path: charts/api-service
    helm:
      valueFiles:
        - ../../staging/api-service/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false